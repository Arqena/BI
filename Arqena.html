<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konekta · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0e10;
  --surface:#16161a;
  --surface2:#1e1e24;
  --surface3:#26262e;
  --border:rgba(255,255,255,0.06);
  --border-md:rgba(255,255,255,0.11);
  --text:#f0eef8;
  --text2:#8a8899;
  --text3:#4a4a5a;
  --accent:#7c5cfc;
  --accent2:#00d4aa;
  --amber:#f0a429;
  --blue:#4da6ff;
  --red:#ff5e5e;
  --r:8px;
  --r-sm:5px;
  --r-lg:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.shell{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-0.01em;}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.upload-btn{font-size:12px;background:var(--surface2);border:0.5px solid var(--border-md);border-radius:var(--r-sm);padding:6px 12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
.upload-btn:hover{color:var(--text);border-color:var(--accent);background:var(--surface3);}
.upload-btn input{display:none;}

/* CONTROL BAR */
.ctrl-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:10px 14px;margin-bottom:8px;flex-wrap:wrap;}
.ctrl-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);flex-shrink:0;margin-right:4px;font-family:"DM Mono",monospace;}
.hosp-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.hp{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:0.5px solid var(--border-md);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.hp:hover{border-color:var(--accent);color:var(--text);}
.hp.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.hp.all.active{background:var(--surface3);border-color:var(--border-md);color:var(--text);}
.cmp-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-md);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.cmp-btn:hover{border-color:var(--blue);color:var(--text);}
.cmp-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.pp-row{display:flex;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:2px;gap:2px;}
.pp{font-size:11px;font-weight:500;padding:4px 10px;border:none;border-radius:4px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
.pp:hover{color:var(--text);}
.pp.active{background:var(--surface3);color:var(--text);box-shadow:0 0 0 0.5px var(--border-md);}

/* PERIOD LABEL */
.period-lbl{font-size:11px;color:var(--text3);margin-bottom:1.5rem;font-family:"DM Mono",monospace;letter-spacing:.02em;}

/* KPI STRIP */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1.25rem;}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.125rem;transition:border-color .15s;}
.kpi:hover{border-color:var(--border-md);}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;font-family:"DM Mono",monospace;}
.kpi-val{font-size:28px;font-weight:600;line-height:1;letter-spacing:-0.02em;}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:5px;}
.up{color:var(--accent2);}
.dn{color:var(--red);}
.acc{color:var(--accent);}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem;}
@media(max-width:640px){.g2,.g31{grid-template-columns:1fr;}}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem 1.375rem;transition:border-color .15s;}
.card-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:16px;font-family:"DM Mono",monospace;}
.chart-wrap{position:relative;}

/* INSIGHT BAR */
.insight{background:var(--surface);border:0.5px solid var(--border);border-left:2px solid var(--accent2);border-radius:var(--r);padding:.875rem 1.125rem;margin-bottom:1.25rem;font-size:13px;color:var(--text2);}
.insight strong{color:var(--text);font-weight:500;}

/* HOSPITAL CARDS */
.hcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem 1.375rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
.hcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .18s;}
.hcard:hover{border-color:var(--border-md);transform:translateY(-1px);}
.hcard:hover::before{opacity:1;}
.hcard-name{font-size:17px;font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;}
.hcard-sub{font-size:11px;color:var(--text3);margin-bottom:16px;}
.hcard-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.hcard-metric-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;font-family:"DM Mono",monospace;}
.hcard-metric-val{font-size:19px;font-weight:600;letter-spacing:-0.01em;}
.open-arrow{font-size:11px;color:var(--text3);position:absolute;top:1.25rem;right:1.375rem;transition:color .15s;}
.hcard:hover .open-arrow{color:var(--accent2);}

/* TABLE */
.tcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1rem;}
.tbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--border);}
.tbar-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:"DM Mono",monospace;}
select{font-size:12px;padding:4px 8px;border-radius:var(--r-sm);border:0.5px solid var(--border-md);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:8px 16px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);text-align:left;background:var(--surface2);border-bottom:0.5px solid var(--border);white-space:nowrap;font-family:"DM Mono",monospace;}
tbody td{padding:10px 16px;border-bottom:0.5px solid var(--border);color:var(--text);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr:hover td{background:var(--surface2);}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"DM Mono",monospace;}

/* BAR */
.bar-bg{background:var(--surface3);border-radius:3px;height:4px;}
.bar-fill{height:4px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* RANK NUM */
.rank{font-size:10px;color:var(--text3);min-width:18px;font-family:"DM Mono",monospace;}

/* EMPTY */
.empty{padding:3rem;text-align:center;color:var(--text3);font-size:13px;}

/* FOOTER */
.footer{margin-top:3rem;padding-top:1rem;border-top:0.5px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;font-family:"DM Mono",monospace;}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeUp .25s ease both;}
</style>
</head>

const EVENTS=RAW.map(r=>({date:new Date(r[0]),ds:r[0],clinic:r[1],hospital:r[2],region:r[3],lost:r[4],days:r[5],post:r[6]||null,caseId:r[7]}));
const HOSPS=[...new Set(EVENTS.map(e=>e.hospital))].sort();
const MAX_D=new Date(Math.max(...EVENTS.map(e=>e.date)));
const HOSP_COLOR={'Vetsia':'var(--amber)','Rijswijk':'var(--blue)'};
const HOSP_HEX={'Vetsia':'#f0a429','Rijswijk':'#4da6ff'};
const HOSP_COUNTRY={'Vetsia':'Spain · ES','Rijswijk':'Netherlands · NL'};

let selH='all',selP=0,cmp=false,C={};

window.addEventListener('DOMContentLoaded',()=>{
  buildPills();
  render();
  document.getElementById('footerDate').textContent=
    new Date(Math.min(...EVENTS.map(e=>e.date))).toLocaleDateString('en-GB',{month:'short',year:'numeric'})+
    ' – '+MAX_D.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
});

function buildPills(){
  const el=document.getElementById('hospPills');
  el.innerHTML='';
  const a=document.createElement('button');
  a.className='hp all active';a.textContent='All hospitals';
  a.onclick=()=>selHosp('all');el.appendChild(a);
  HOSPS.forEach(h=>{
    const b=document.createElement('button');
    b.className='hp';b.textContent=h;b.dataset.h=h;
    b.onclick=()=>selHosp(h);el.appendChild(b);
  });
}

function selHosp(h){
  selH=h;
  document.querySelectorAll('.hp').forEach(b=>b.classList.remove('active'));
  const t=h==='all'?document.querySelector('.hp.all'):document.querySelector(`[data-h="${h}"]`);
  if(t)t.classList.add('active');
  render();
}
function toggleCompare(){cmp=!cmp;document.getElementById('cmpBtn').classList.toggle('on',cmp);render();}
function setPeriod(d,el){selP=d;document.querySelectorAll('.pp').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function byPeriod(ev){if(!selP)return ev;const c=new Date(MAX_D);c.setDate(c.getDate()-selP);return ev.filter(e=>e.date>=c);}
function byHosp(ev,h){return h==='all'?ev:ev.filter(e=>e.hospital===h);}
function periodStr(ev){
  if(!ev.length)return'';
  const ds=ev.map(e=>e.date),f=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  return f(new Date(Math.min(...ds)))+' – '+f(new Date(Math.max(...ds)));
}

function agg(ev){
  const cases={},mo={},pl=[];
  ev.forEach(e=>{
    const k=e.caseId;
    if(!cases[k])cases[k]={caseId:k,clinic:e.clinic,hospital:e.hospital,ds:e.ds,maxPost:0};
    if((e.post||0)>cases[k].maxPost)cases[k].maxPost=e.post||0;
    if(e.post!==null)pl.push(e.post);
    const m=e.ds.slice(0,7);mo[m]=(mo[m]||0)+1;
  });
  const cArr=Object.values(cases);
  const uniqueTotal=cArr.length;
  const replied=cArr.filter(c=>c.maxPost>1).length;
  const responseRate=uniqueTotal>0?Math.round(replied/uniqueTotal*100):0;
  const cm={};
  cArr.forEach(c=>{
    if(!cm[c.clinic])cm[c.clinic]={name:c.clinic,n:0,replied:0};
    cm[c.clinic].n++;
    if(c.maxPost>1)cm[c.clinic].replied++;
  });
  const avgPost=pl.length?(pl.reduce((a,b)=>a+b,0)/pl.length).toFixed(1):'–';
  const dl=ev.filter(e=>e.days!==null).map(e=>typeof e.days==='string'?parseFloat(e.days.replace(',','.')):e.days).filter(v=>!isNaN(v));
  const avgDays=dl.length?(dl.reduce((a,b)=>a+b,0)/dl.length).toFixed(1):'–';
  const daysN=dl.length;
  return{clinics:Object.values(cm).sort((a,b2)=>b2.n-a.n),monthly:mo,total:uniqueTotal,replied,responseRate,avgDays,daysN,avgPost};
}

function render(){
  const pev=byPeriod(EVENTS);
  document.getElementById('periodLbl').textContent=periodStr(pev);
  const el=document.getElementById('main');
  el.classList.remove('fade');void el.offsetWidth;el.classList.add('fade');
  if(cmp){renderCompare(pev);return;}
  if(selH==='all')renderAll(pev);
  else renderHosp(byHosp(pev,selH),selH);
}

  const td=agg(pev);

  document.getElementById('main').innerHTML=`
    <div class="kpis">

      ${K('Clinics',cl,'referring')}

    <div class="g31">

        <div class="card-ttl">Referral volume — all hospitals</div>
        <div class="chart-wrap" style="height:200px"><canvas id="cAll" role="img" aria-label="All hospitals trend"></canvas></div>
      </div>
      <div class="card">
        <div class="card-ttl">By region</div>

                <div class="hcard-metric-val">${v}</div>
              </div>`).join('')}

function renderHosp(ev,h){
  const d=agg(ev);
  const col=HOSP_HEX[h]||'#7c5cfc';
  const months=Object.entries(d.monthly).sort((a,b)=>b[1]-a[1]);
  const bestM=months[0];
  const top=d.clinics[0];
  const mArr=Object.entries(d.monthly).sort((a,b)=>a[0].localeCompare(b[0]));
  const half=Math.ceil(mArr.length/2);
  const last=mArr.slice(half).reduce((s,[,v])=>s+v,0);
  const prev=mArr.slice(0,half).reduce((s,[,v])=>s+v,0);
  const g=prev>0?Math.round((last-prev)/prev*100):null;
  const gs=g!==null?(g>=0?`↑ ${g}% vs prior period`:`↓ ${Math.abs(g)}% vs prior period`):'';
  const gc=g!==null&&g>=0?'up':'dn';

  document.getElementById('main').innerHTML=`
    <div class="insight">
      <strong>${h}</strong> · ${HOSP_COUNTRY[h]||''} · <strong>${d.total}</strong> unique cases · <strong>${d.responseRate}%</strong> response rate · avg <strong>${d.avgPost}</strong> messages/case · avg <strong>${d.avgDays}</strong> days to appt <span style="color:var(--text3);font-size:11px">(${d.daysN} cases)</span>
      ${bestM?` · Peak: <strong>${fmtMonth(bestM[0])}</strong> (${bestM[1]} events)`:''}
      ${top?` · Top clinic: <strong>${top.name}</strong>`:''}
    </div>
    <div class="kpis">
      ${K('Unique cases',d.total,gs,gc)}
      ${K('Response rate',d.responseRate+'%',d.replied+' of '+d.total,'acc')}
      ${K('Avg messages',d.avgPost,'per case')}
      ${K('Avg days to appt',d.avgDays,d.daysN+' cases recorded')}
      ${K('Clinics',d.clinics.length,'referring')}
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-ttl">Referral volume over time — ${h}</div>
      <div class="chart-wrap" style="height:220px"><canvas id="cH" role="img" aria-label="${h} trend"></canvas></div>
    </div>
    <div class="tcard">
      <div class="tbar">
        <span class="tbar-ttl">Referring clinics</span>
        <select onchange="resortClinics(this.value,'${h}')">
          <option value="n">Sort: cases ↓</option>
          <option value="replied">Sort: replied ↓</option>
          <option value="rate">Sort: response rate ↓</option>
        </select>
      </div>
      <div id="clinicTable">${clinicTbl(d.clinics,col)}</div>
    </div>`;
  drawBar('cH',ev,h,col);
}

function resortClinics(by,h){
  const ev=byHosp(byPeriod(EVENTS),h);
  const d=agg(ev);
  const col=HOSP_HEX[h]||'#7c5cfc';
  let cl=[...d.clinics];
  if(by==='replied')cl.sort((a,b)=>b.replied-a.replied);
  else if(by==='rate')cl.sort((a,b)=>(b.n>0?b.replied/b.n:0)-(a.n>0?a.replied/a.n:0));
  document.getElementById('clinicTable').innerHTML=clinicTbl(cl,col);
}

function clinicTbl(clinics,col){
  if(!clinics.length)return'<div class="empty">No data for this period</div>';
  const max=clinics[0].n;
  return`<table><thead><tr>
    <th style="width:38%">Clinic</th>
    <th class="num" style="width:13%">Cases</th>
    <th class="num" style="width:12%">Replied</th>
    <th style="width:37%">Response rate</th>
  </tr></thead><tbody>
  ${clinics.map((c,i)=>{
    const r=c.n>0?Math.round(c.replied/c.n*100):0;
    return`<tr>
      <td><div style="display:flex;align-items:center;gap:10px">
        <span class="rank">${i+1}</span>
        <span style="font-weight:500">${c.name}</span>
      </div></td>
      <td class="num">${c.n}</td>
      <td class="num" style="color:var(--text2)">${c.replied}</td>
      <td><div style="display:flex;align-items:center;gap:10px">
        <div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:${Math.round(c.n/max*100)}%;background:${col}"></div></div>
        <span style="font-size:11px;color:var(--text2);min-width:28px;text-align:right;font-family:'DM Mono',monospace">${r}%</span>
      </div></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

function renderCompare(pev){
  const h1=HOSPS[0],h2=HOSPS[1];
  const e1=byHosp(pev,h1),e2=byHosp(pev,h2);
  const d1=agg(e1),d2=agg(e2);

  const mRow=(label,v1,v2,hb=true)=>{
    const n1=parseFloat(v1),n2=parseFloat(v2);

    return`<tr>
      <td style="font-size:12px;color:var(--text2);padding:9px 16px">${label}</td>
      <td class="num" style="padding:9px 16px;font-weight:${w1?600:400};color:${w1?c1:'var(--text)'}">${v1}</td>
      <td class="num" style="padding:9px 16px;font-weight:${w2?600:400};color:${w2?c2:'var(--text)'}">${v2}</td>
    </tr>`;
  };

    <div class="g2" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-ttl">Referral volume — both hospitals</div>

        <div class="card-ttl">Side-by-side</div>

          <thead><tr>
            <th></th>
            <th class="num" style="color:${c1};padding:8px 16px">${h1}</th>
            <th class="num" style="color:${c2};padding:8px 16px">${h2}</th>
          </tr></thead>
          <tbody>
            ${mRow('Unique cases',d1.total,d2.total)}
            ${mRow('Response rate',d1.responseRate+'%',d2.responseRate+'%')}
            ${mRow('Avg days to appt',d1.avgDays,d2.avgDays,false)}
            ${mRow('Avg messages/case',d1.avgPost,d2.avgPost)}
            ${mRow('Clinics',d1.clinics.length,d2.clinics.length)}
          </tbody>
        </table>
      </div>
    </div>
    <div class="g2">
      <div class="tcard">
        <div class="tbar"><span class="tbar-ttl" style="color:${c1}">${h1} · Top clinics</span></div>
        ${clinicTbl(d1.clinics.slice(0,8),c1)}
      </div>
      <div class="tcard">
        <div class="tbar"><span class="tbar-ttl" style="color:${c2}">${h2} · Top clinics</span></div>
        ${clinicTbl(d2.clinics.slice(0,8),c2)}
      </div>
    </div>`;
  drawCompare('cCmp',e1,e2,h1,h2,c1,c2);
}

/* CHART HELPERS */
function dc(){return{tc:'#4a4a5a',gc:'rgba(255,255,255,0.04)'};}
function dest(id){if(C[id]){C[id].destroy();delete C[id];}}
function fmtMonth(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo]+' \''+y.slice(2);}

function monthBuckets(ev){
  const m={},seen={};
  ev.forEach(e=>{const k=e.ds.slice(0,7);if(!seen[e.caseId]){seen[e.caseId]=1;m[k]=(m[k]||0)+1;}});
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
}

function drawAllBar(id,pev){
  dest(id);const el=document.getElementById(id);if(!el)return;
  const{tc,gc}=dc();
  const allM=[...new Set(pev.map(e=>e.ds.slice(0,7)))].sort();
  const hospCounts={};
  HOSPS.forEach(h=>{
    const seen={};
    hospCounts[h]=allM.map(m=>{
      let n=0;
      pev.filter(e=>e.hospital===h&&e.ds.startsWith(m)).forEach(e=>{if(!seen[e.caseId]){seen[e.caseId]=1;n++;}});
      return n;
    });
  });
  const totals=allM.map((_,i)=>HOSPS.reduce((s,h)=>s+hospCounts[h][i],0));
  C[id]=new Chart(el,{type:'bar',
    data:{labels:allM.map(fmtMonth),datasets:[{label:'Total',data:totals,backgroundColor:'rgba(124,92,252,0.25)',borderColor:'#7c5cfc',borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        title:items=>`${items[0].label}  ·  ${totals[items[0].dataIndex]} cases`,
        label:()=>null,
        afterBody:items=>{const i=items[0].dataIndex;return HOSPS.filter(h=>hospCounts[h][i]>0).map(h=>`  ${h}: ${hospCounts[h][i]}`);}
      },displayColors:false}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{display:false}},
              y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},beginAtZero:true}}}});
}

function drawBar(id,ev,label,col){
  dest(id);const el=document.getElementById(id);if(!el)return;
  const{tc,gc}=dc(),bkts=monthBuckets(ev);
  C[id]=new Chart(el,{type:'bar',
    data:{labels:bkts.map(([m])=>fmtMonth(m)),datasets:[{label,data:bkts.map(([,v])=>v),backgroundColor:col+'44',borderColor:col,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{display:false}},
              y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},beginAtZero:true}}}});
}

function drawRegion(id,pev){
  const el=document.getElementById(id);if(!el)return;
  const seen={},byCo={};
  pev.forEach(e=>{
    if(!seen[e.caseId]){
      seen[e.caseId]=1;
      const key=e.region||e.hospital;
      if(!byCo[key])byCo[key]={region:e.region,hospital:e.hospital,n:0};
      byCo[key].n++;
    }
  });
  const total=Object.values(seen).length;
  const entries=Object.entries(byCo).sort((a,b)=>b[1].n-a[1].n);
  const cols={'Spain':'#f0a429','Netherlands':'#4da6ff'};
  el.innerHTML=`<div style="display:flex;flex-direction:column;gap:18px;padding-top:4px">
    ${entries.map(([key,v])=>{
      const pct=total>0?Math.round(v.n/total*100):0;
      const col=cols[v.region]||'#7c5cfc';
      return`<div>
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <div>
            <div style="font-size:13px;font-weight:500;color:var(--text)">${v.region}</div>
            <div style="font-size:10px;color:var(--text3);margin-top:2px;font-family:'DM Mono',monospace">${v.hospital}</div>
          </div>
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:600;letter-spacing:-0.02em;color:${col}">${v.n}</div>
            <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace">${pct}% of cases</div>
          </div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      </div>`;
    }).join('')}
    <div style="border-top:0.5px solid var(--border);padding-top:14px;display:flex;justify-content:space-between;align-items:baseline">
      <div style="font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em">Total</div>
      <div style="font-size:20px;font-weight:600;letter-spacing:-0.02em">${total}</div>
    </div>
  </div>`;
}

function drawCompare(id,e1,e2,l1,l2,c1,c2){
  dest(id);const el=document.getElementById(id);if(!el)return;
  const{tc,gc}=dc();
  const allM=[...new Set([...e1,...e2].map(e=>e.ds.slice(0,7)))].sort();
  const cnt=(ev,m)=>{const s={};ev.filter(e=>e.ds.startsWith(m)).forEach(e=>s[e.caseId]=1);return Object.keys(s).length;};
  C[id]=new Chart(el,{type:'bar',
    data:{labels:allM.map(fmtMonth),datasets:[
      {label:l1,data:allM.map(m=>cnt(e1,m)),backgroundColor:c1+'33',borderColor:c1,borderWidth:1.5,borderRadius:4},
      {label:l2,data:allM.map(m=>cnt(e2,m)),backgroundColor:c2+'33',borderColor:c2,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:11},boxWidth:10,padding:8}}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{display:false}},
              y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},beginAtZero:true}}}});
}

function K(label,val,sub,cls=''){
  return`<div class="kpi"><div class="kpi-lbl">${label}</div><div class="kpi-val">${val}</div>${sub?`<div class="kpi-sub ${cls}">${sub}</div>`:''}</div>`;
}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.trim().split('\n');
    const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const ci=hdr.indexOf('case_organization_name'),hi=hdr.indexOf('contributor_organization_name');
    const ri=hdr.indexOf('Region'),li=hdr.indexOf('is_lost'),di=hdr.indexOf('days_to_appt'),ti=hdr.indexOf('referral_sent_at_utc'),pi=hdr.indexOf('post_count'),ki=hdr.indexOf('case_id');
    if(ci<0||hi<0){alert('Required columns not found.');return;}
    EVENTS.length=0;
    lines.slice(1).forEach(l=>{
      const v=l.split(',').map(x=>x.trim().replace(/"/g,''));
      const ds=(v[ti]||'').slice(0,10);
      if(ds&&v[ci]&&v[hi])EVENTS.push({
        date:new Date(ds),ds,clinic:v[ci],hospital:v[hi],region:v[ri]||'',
        lost:v[li]==='0'?0:1,
        days:parseFloat((v[di]||'').replace(',','.'))||null,
        post:parseInt(v[pi])||null,
        caseId:parseInt(v[ki])||null
      });
    });
    HOSPS.length=0;
    [...new Set(EVENTS.map(e=>e.hospital))].sort().forEach(h=>HOSPS.push(h));
    selH='all';buildPills();render();
  };
  r.readAsText(file);
}
</script>
