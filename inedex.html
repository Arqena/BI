<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Konekta · Internal Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f1; --surface: #fff; --surface2: #efede8;
  --border: rgba(0,0,0,0.07); --border-md: rgba(0,0,0,0.12);
  --text: #181816; --text2: #6b6b67; --text3: #a0a09c;
  --green: #1D9E75; --green-bg: #e1f5ee; --green-dk: #0f6e56;
  --blue: #378ADD; --blue-bg: #e6f1fb;
  --amber: #BA7517; --amber-bg: #faeeda;
  --red: #A32D2D; --r: 10px; --r-sm: 6px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #111110; --surface: #1b1b19; --surface2: #222220;
    --border: rgba(255,255,255,0.07); --border-md: rgba(255,255,255,0.12);
    --text: #f0ede8; --text2: #9b9b97; --text3: #5e5e5a;
    --green-bg: #04342c; --blue-bg: #042c53; --amber-bg: #412402;
  }
}
body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; font-size:14px; }
.shell { max-width:1080px; margin:0 auto; padding:1.75rem 1.5rem 3rem; }

/* topbar */
.topbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:10px; }
.logo { display:flex; align-items:center; gap:9px; }
.logo-mark { width:30px; height:30px; border-radius:7px; background:var(--green); display:flex; align-items:center; justify-content:center; }
.logo-mark svg { width:17px; height:17px; }
.logo-name { font-size:15px; font-weight:600; }
.logo-sub { font-size:11px; color:var(--text2); }
.upload-btn { font-size:12px; background:var(--surface); border:0.5px solid var(--border-md); border-radius:var(--r-sm); padding:5px 11px; color:var(--text2); cursor:pointer; transition:all .12s; }
.upload-btn:hover { color:var(--text); background:var(--surface2); }
.upload-btn input { display:none; }

/* hospital bar */
.hosp-bar { display:flex; align-items:center; gap:8px; background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r); padding:10px 14px; margin-bottom:10px; flex-wrap:wrap; }
.hosp-bar-label { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); flex-shrink:0; margin-right:2px; }
.hosp-pills { display:flex; gap:5px; flex-wrap:wrap; flex:1; }
.hp { font-size:13px; font-weight:500; padding:5px 14px; border-radius:20px; border:0.5px solid var(--border-md); background:transparent; color:var(--text2); cursor:pointer; transition:all .13s; white-space:nowrap; }
.hp:hover { border-color:var(--green); color:var(--text); }
.hp.active { background:var(--green); border-color:var(--green); color:#fff; }
.hp.all.active { background:var(--text); border-color:var(--text); color:var(--bg); }
.compare-btn { font-size:11px; padding:5px 12px; border-radius:20px; border:0.5px solid var(--border-md); background:transparent; color:var(--text2); cursor:pointer; transition:all .12s; white-space:nowrap; }
.compare-btn.on { background:var(--blue); border-color:var(--blue); color:#fff; }
.period-picker { display:flex; background:var(--surface2); border:0.5px solid var(--border); border-radius:var(--r-sm); padding:2px; gap:2px; }
.pp { font-size:11px; font-weight:500; padding:4px 10px; border:none; border-radius:4px; background:transparent; color:var(--text2); cursor:pointer; transition:all .12s; }
.pp:hover { color:var(--text); }
.pp.active { background:var(--surface); color:var(--text); box-shadow:0 0 0 0.5px var(--border-md); }

/* period label */
.period-lbl { font-size:11px; color:var(--text3); margin-bottom:1.25rem; }

/* kpi strip */
.kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; margin-bottom:1.25rem; }
.kpi { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r); padding:.875rem 1rem; }
.kpi-lbl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:5px; }
.kpi-val { font-size:26px; font-weight:600; line-height:1; }
.kpi-sub { font-size:11px; color:var(--text2); margin-top:4px; }
.up { color:var(--green); } .dn { color:var(--red); }

/* grid */
.g2 { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
.g31 { display:grid; grid-template-columns:2fr 1fr; gap:1rem; margin-bottom:1rem; }
@media(max-width:640px){ .g2,.g31{ grid-template-columns:1fr; } }

/* card */
.card { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r); padding:1.125rem 1.25rem; }
.card-title { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); margin-bottom:14px; }
.chart-wrap { position:relative; }

/* insight */
.insight { background:var(--green-bg); border-radius:var(--r); padding:.875rem 1.125rem; margin-bottom:1.25rem; font-size:13px; color:var(--green-dk); }
.insight strong { font-weight:600; }

/* table */
.tcard { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r); overflow:hidden; margin-bottom:1rem; }
.tbar { display:flex; align-items:center; justify-content:space-between; padding:8px 14px; border-bottom:0.5px solid var(--border); }
.tbar-ttl { font-size:10px; text-transform:uppercase; letter-spacing:.06em; color:var(--text3); }
select { font-size:12px; padding:4px 8px; border-radius:var(--r-sm); border:0.5px solid var(--border-md); background:var(--surface); color:var(--text); cursor:pointer; }
table { width:100%; border-collapse:collapse; font-size:13px; }
thead th { padding:7px 14px; font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--text3); text-align:left; background:var(--surface2); border-bottom:0.5px solid var(--border); white-space:nowrap; }
tbody td { padding:9px 14px; border-bottom:0.5px solid var(--border); }
tbody tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:var(--surface2); }
.num { text-align:right; font-variant-numeric:tabular-nums; }

/* bar */
.bar-bg { background:var(--surface2); border-radius:3px; height:5px; }
.bar-fill { height:5px; border-radius:3px; background:var(--green); }

/* hosp card */
.hcard { background:var(--surface); border:0.5px solid var(--border); border-radius:var(--r); padding:1.125rem 1.25rem; cursor:pointer; transition:border-color .15s; }
.hcard:hover { border-color:var(--green); }

/* empty */
.empty { padding:2.5rem; text-align:center; color:var(--text3); font-size:13px; }

/* footer */
.footer { margin-top:2.5rem; padding-top:1rem; border-top:0.5px solid var(--border); font-size:11px; color:var(--text3); display:flex; justify-content:space-between; flex-wrap:wrap; gap:4px; }
</style>
</head>

  <div id="main"></div>

  <div class="footer">

</div>

const EVENTS = RAW.map(r=>({date:new Date(r[0]),ds:r[0],clinic:r[1],hospital:r[2],region:r[3],lost:r[4],days:r[5]}));
const HOSPS = [...new Set(EVENTS.map(e=>e.hospital))].sort();
const MAX_D = new Date(Math.max(...EVENTS.map(e=>e.date)));
const HOSP_COLOR = { 'Vetsia':'#BA7517', 'Rijswijk':'#378ADD' };
const HOSP_COUNTRY = { 'Vetsia':'Spain · ES', 'Rijswijk':'Netherlands · NL' };

let selH='all', selP=0, cmp=false, C={};

window.addEventListener('DOMContentLoaded',()=>{ buildPills(); render(); });

function buildPills(){
  const el=document.getElementById('hospPills');
  el.innerHTML='';
  const a=document.createElement('button');
  a.className='hp all active'; a.textContent='All hospitals';
  a.onclick=()=>selHosp('all'); el.appendChild(a);
  HOSPS.forEach(h=>{
    const b=document.createElement('button');
    b.className='hp'; b.textContent=h; b.dataset.h=h;
    b.onclick=()=>selHosp(h); el.appendChild(b);
  });
}

function selHosp(h){
  selH=h;
  document.querySelectorAll('.hp').forEach(b=>b.classList.remove('active'));
  const t=h==='all'?document.querySelector('.hp.all'):document.querySelector(`[data-h="${h}"]`);
  if(t) t.classList.add('active');
  render();
}

function toggleCompare(){
  cmp=!cmp;
  document.getElementById('cmpBtn').classList.toggle('on',cmp);
  render();
}

function setPeriod(d,el){
  selP=d;
  document.querySelectorAll('.pp').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function byPeriod(ev){ if(!selP) return ev; const c=new Date(MAX_D); c.setDate(c.getDate()-selP); return ev.filter(e=>e.date>=c); }
function byHosp(ev,h){ return h==='all'?ev:ev.filter(e=>e.hospital===h); }

function periodStr(ev){
  if(!ev.length) return '';
  const ds=ev.map(e=>e.date), f=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  return f(new Date(Math.min(...ds)))+' – '+f(new Date(Math.max(...ds)));
}

function agg(ev){
  const cm={},mo={};
  let b=0, dl=[];
  ev.forEach(e=>{
    if(!cm[e.clinic]) cm[e.clinic]={name:e.clinic,n:0,booked:0};
    cm[e.clinic].n++;
    if(e.lost===0){cm[e.clinic].booked++;b++;}
    const m=e.ds.slice(0,7); mo[m]=(mo[m]||0)+1;
    if(e.lost===0&&e.days!==null) dl.push(e.days);
  });
  const t=ev.length;
  return {
    clinics:Object.values(cm).sort((a,b2)=>b2.n-a.n),
    monthly:mo, total:t, booked:b,
    rate:t>0?Math.round(b/t*100):0,
    avgDays:dl.length?(dl.reduce((a,b2)=>a+b2,0)/dl.length).toFixed(1):'–'
  };
}

function render(){
  const pev=byPeriod(EVENTS);
  document.getElementById('periodLbl').textContent=periodStr(pev);
  if(cmp){ renderCompare(pev); return; }
  if(selH==='all') renderAll(pev);
  else renderHosp(byHosp(pev,selH),selH);
}

// ── HOSPITAL VIEW ─────────────────────────────────────────────────────────────
function renderHosp(ev,h){
  const d=agg(ev);
  const col=HOSP_COLOR[h]||'#1D9E75';
  const months=Object.entries(d.monthly).sort((a,b)=>b[1]-a[1]);
  const bestM=months[0];
  const top=d.clinics[0];

  // growth: last vs prev half of available months
  const mArr=Object.entries(d.monthly).sort((a,b)=>a[0].localeCompare(b[0]));
  const half=Math.ceil(mArr.length/2);
  const last=mArr.slice(half).reduce((s,[,v])=>s+v,0);
  const prev=mArr.slice(0,half).reduce((s,[,v])=>s+v,0);
  const g=prev>0?Math.round((last-prev)/prev*100):null;
  const gs=g!==null?(g>=0?`↑ ${g}% vs prior period`:`↓ ${Math.abs(g)}% vs prior period`):'';
  const gc=g!==null&&g>=0?'up':'dn';

  document.getElementById('main').innerHTML=`
    <div class="insight">
      <strong>${h}</strong> · ${HOSP_COUNTRY[h]||''} · ${d.total} referrals · ${d.rate}% booking rate · avg ${d.avgDays} days to appointment
      ${bestM?` · Peak month: <strong>${fmtMonth(bestM[0])}</strong> (${bestM[1]} referrals)`:''}
      ${top?` · Top clinic: <strong>${top.name}</strong> (${top.n} referrals, ${top.booked} booked)`:''}
    </div>
    <div class="kpis">
      ${K('Referrals',d.total,gs,gc)}
      ${K('Booked',d.booked,d.rate+'% booking rate')}
      ${K('Avg days to appt',d.avgDays,'among booked')}
      ${K('Clinics',d.clinics.length,'referring')}
    </div>
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Referral volume over time — ${h}</div>
      <div class="chart-wrap" style="height:220px"><canvas id="cH" role="img" aria-label="${h} trend"></canvas></div>
    </div>
    <div class="tcard">
      <div class="tbar">
        <span class="tbar-ttl">Referring clinics</span>
        <select onchange="resortClinics(this.value,'${h}')">
          <option value="n">Sort: referrals ↓</option>
          <option value="booked">Sort: booked ↓</option>
          <option value="rate">Sort: booking rate ↓</option>
        </select>
      </div>
      <div id="clinicTable">${clinicTbl(d.clinics,col)}</div>
    </div>`;

  drawBar('cH',ev,h,col);
}

function resortClinics(by,h){
  const ev=byHosp(byPeriod(EVENTS),h);
  const d=agg(ev);
  const col=HOSP_COLOR[h]||'var(--green)';
  let cl=[...d.clinics];
  if(by==='booked') cl.sort((a,b)=>b.booked-a.booked);
  else if(by==='rate') cl.sort((a,b)=>(b.n>0?b.booked/b.n:0)-(a.n>0?a.booked/a.n:0));
  document.getElementById('clinicTable').innerHTML=clinicTbl(cl,col);
}

function clinicTbl(clinics,col){
  if(!clinics.length) return '<div class="empty">No data for this period</div>';
  const max=clinics[0].n;
  return `<table><thead><tr>
    <th style="width:40%">Clinic</th>
    <th class="num" style="width:14%">Referrals</th>
    <th class="num" style="width:12%">Booked</th>
    <th style="width:34%">Booking rate</th>
  </tr></thead><tbody>
  ${clinics.map((c,i)=>{
    const r=c.n>0?Math.round(c.booked/c.n*100):0;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:10px;color:var(--text3);min-width:16px">${i+1}</span>
        <span style="font-weight:500;font-size:13px">${c.name}</span>
      </div></td>
      <td class="num">${c.n}</td>
      <td class="num">${c.booked}</td>
      <td><div style="display:flex;align-items:center;gap:8px">
        <div class="bar-bg" style="flex:1"><div class="bar-fill" style="width:${Math.round(c.n/max*100)}%;background:${col}"></div></div>
        <span style="font-size:11px;color:var(--text2);min-width:28px;text-align:right">${r}%</span>
      </div></td>
    </tr>`;
  }).join('')}</tbody></table>`;
}

// ── COMPARE VIEW ──────────────────────────────────────────────────────────────
function renderCompare(pev){
  const h1=HOSPS[0],h2=HOSPS[1];
  const e1=byHosp(pev,h1),e2=byHosp(pev,h2);
  const d1=agg(e1),d2=agg(e2);
  const c1=HOSP_COLOR[h1]||'#BA7517',c2=HOSP_COLOR[h2]||'#378ADD';

  const metricRow=(label,v1,v2,higherBetter=true)=>{
    const n1=parseFloat(v1),n2=parseFloat(v2);
    const win1=higherBetter?n1>n2:n1<n2, win2=higherBetter?n2>n1:n2<n1;
    return `<tr>
      <td style="font-size:12px;color:var(--text2);padding:8px 14px">${label}</td>
      <td class="num" style="padding:8px 14px;font-weight:${win1?600:400};color:${win1?c1:'var(--text)'}">${v1}</td>
      <td class="num" style="padding:8px 14px;font-weight:${win2?600:400};color:${win2?c2:'var(--text)'}">${v2}</td>
    </tr>`;
  };

  document.getElementById('main').innerHTML=`
    <div class="g2" style="margin-bottom:1rem">
      <div class="card">
        <div class="card-title">Referral volume — both hospitals</div>
        <div class="chart-wrap" style="height:220px"><canvas id="cCmp" role="img" aria-label="Comparison"></canvas></div>
      </div>
      <div class="card">
        <div class="card-title">Side-by-side</div>
        <table>
          <thead><tr>
            <th></th>
            <th class="num" style="color:${c1}">${h1}</th>
            <th class="num" style="color:${c2}">${h2}</th>
          </tr></thead>
          <tbody>
            ${metricRow('Referrals',d1.total,d2.total)}
            ${metricRow('Booked',d1.booked,d2.booked)}
            ${metricRow('Booking rate',d1.rate+'%',d2.rate+'%')}
            ${metricRow('Avg days to appt',d1.avgDays,d2.avgDays,false)}
            ${metricRow('Clinics',d1.clinics.length,d2.clinics.length)}
          </tbody>
        </table>
      </div>
    </div>
    <div class="g2">
      <div class="tcard">
        <div class="tbar"><span class="tbar-ttl" style="color:${c1}">${h1} · Top clinics</span></div>
        ${clinicTbl(d1.clinics.slice(0,8),c1)}
      </div>
      <div class="tcard">
        <div class="tbar"><span class="tbar-ttl" style="color:${c2}">${h2} · Top clinics</span></div>
        ${clinicTbl(d2.clinics.slice(0,8),c2)}
      </div>
    </div>`;

  drawCompare('cCmp',e1,e2,h1,h2,c1,c2);
}

function dc(){const dk=matchMedia('(prefers-color-scheme: dark)').matches;return{tc:dk?'#6b6b67':'#a0a09c',gc:dk?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.05)'};}
function dest(id){if(C[id]){C[id].destroy();delete C[id];}}

function monthBuckets(ev){
  const m={};
  ev.forEach(e=>{const k=e.ds.slice(0,7);m[k]=(m[k]||0)+1;});
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0]));
}
function fmtMonth(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo]+' '+y.slice(2);}

function drawBar(id,ev,label,col){
  dest(id); const el=document.getElementById(id); if(!el) return;
  const {tc,gc}=dc(), bkts=monthBuckets(ev);
  C[id]=new Chart(el,{type:'bar',
    data:{labels:bkts.map(([m])=>fmtMonth(m)),datasets:[{label,data:bkts.map(([,v])=>v),backgroundColor:col+'44',borderColor:col,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{display:false}},
              y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},beginAtZero:true}}}});
}

function drawDonut(id,ev){
  dest(id); const el=document.getElementById(id); if(!el) return;
  const {tc}=dc();
  const sp=ev.filter(e=>e.region==='Spain').length, nl=ev.filter(e=>e.region==='Netherlands').length;
  C[id]=new Chart(el,{type:'doughnut',
    data:{labels:['Spain','Netherlands'],datasets:[{data:[sp,nl],backgroundColor:['#BA7517','#378ADD'],borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
      plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:11},boxWidth:10,padding:8}}}}});
}

function drawCompare(id,e1,e2,l1,l2,c1,c2){
  dest(id); const el=document.getElementById(id); if(!el) return;
  const {tc,gc}=dc();
  const all=[...new Set([...e1,...e2].map(e=>e.ds.slice(0,7)))].sort();
  const cnt=(ev,m)=>ev.filter(e=>e.ds.startsWith(m)).length;
  C[id]=new Chart(el,{type:'bar',
    data:{labels:all.map(fmtMonth),datasets:[
      {label:l1,data:all.map(m=>cnt(e1,m)),backgroundColor:c1+'44',borderColor:c1,borderWidth:1.5,borderRadius:4},
      {label:l2,data:all.map(m=>cnt(e2,m)),backgroundColor:c2+'44',borderColor:c2,borderWidth:1.5,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:11},boxWidth:10,padding:8}}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{display:false}},
              y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},beginAtZero:true}}}});
}

// ── KPI HELPER ────────────────────────────────────────────────────────────────
function K(label,val,sub,cls=''){
  return`<div class="kpi"><div class="kpi-lbl">${label}</div><div class="kpi-val">${val}</div>${sub?`<div class="kpi-sub ${cls}">${sub}</div>`:''}</div>`;
}

// ── FILE UPLOAD ───────────────────────────────────────────────────────────────
function handleFile(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    const lines=ev.target.result.trim().split('\n');
    const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
    const ci=hdr.indexOf('case_organization_name'), hi=hdr.indexOf('contributor_organization_name');
    const ri=hdr.indexOf('Region'), li=hdr.indexOf('is_lost'), di=hdr.indexOf('days_to_appt'), ti=hdr.indexOf('referral_sent_at_utc');
    if(ci<0||hi<0){alert('Required columns not found in CSV.');return;}
    EVENTS.length=0;
    lines.slice(1).forEach(l=>{
      const v=l.split(',').map(x=>x.trim().replace(/"/g,''));
      const ds=(v[ti]||'').slice(0,10);
      if(ds&&v[ci]&&v[hi]) EVENTS.push({date:new Date(ds),ds,clinic:v[ci],hospital:v[hi],region:v[ri]||'',lost:v[li]==='0'?0:1,days:parseFloat(v[di])||null});
    });
    HOSPS.length=0;
    [...new Set(EVENTS.map(e=>e.hospital))].sort().forEach(h=>HOSPS.push(h));
    selH='all'; buildPills(); render();
  };
  r.readAsText(file);
}
</script>
