
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arqena · Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0e0e10;
  --surface:#16161a;
  --surface2:#1e1e24;
  --surface3:#26262e;
  --border:rgba(255,255,255,0.06);
  --border-md:rgba(255,255,255,0.11);
  --text:#f0eef8;
  --text2:#8a8899;
  --text3:#868693;
  --accent:#7c5cfc;
  --accent2:#00d4aa;
  --amber:#f0a429;
  --blue:#4da6ff;
  --red:#ff5e5e;
  --r:8px;
  --r-sm:5px;
  --r-lg:12px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;}
.shell{max-width:1100px;margin:0 auto;padding:2rem 1.5rem 4rem;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;flex-wrap:wrap;gap:12px;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:18px;height:18px;}
.logo-name{font-size:15px;font-weight:600;letter-spacing:-0.01em;}
.logo-sub{font-size:11px;color:var(--text2);margin-top:1px;}
.upload-btn{font-size:12px;background:var(--surface2);border:0.5px solid var(--border-md);border-radius:var(--r-sm);padding:6px 12px;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
.upload-btn:hover{color:var(--text);border-color:var(--accent);background:var(--surface3);}
.upload-btn input{display:none;}

/* CONTROL BAR */
.ctrl-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:10px 14px;margin-bottom:8px;flex-wrap:wrap;}
.ctrl-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);flex-shrink:0;margin-right:4px;font-family:"DM Mono",monospace;}
.hosp-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.hp{font-size:12px;font-weight:500;padding:5px 14px;border-radius:20px;border:0.5px solid var(--border-md);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.hp:hover{border-color:var(--accent);color:var(--text);}
.hp.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.hp.all.active{background:var(--surface3);border-color:var(--border-md);color:var(--text);}
.cmp-btn{font-size:11px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-md);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;}
.cmp-btn:hover{border-color:var(--blue);color:var(--text);}
.cmp-btn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.pp-row{display:flex;background:var(--surface2);border:0.5px solid var(--border);border-radius:var(--r-sm);padding:2px;gap:2px;}
.pp{font-size:11px;font-weight:500;padding:4px 10px;border:none;border-radius:4px;background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;font-family:inherit;}
.pp:hover{color:var(--text);}
.pp.active{background:var(--surface3);color:var(--text);box-shadow:0 0 0 0.5px var(--border-md);}

/* PERIOD LABEL */
.period-lbl{font-size:11px;color:var(--text3);margin-bottom:1.5rem;font-family:"DM Mono",monospace;letter-spacing:.02em;}

/* KPI STRIP */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:1.25rem;align-items:stretch;}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:1rem 1.125rem;transition:border-color .15s;display:flex;flex-direction:column;}
.kpi:hover{border-color:var(--border-md);}
.kpi-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:8px;font-family:"DM Mono",monospace;}
.kpi-val{font-size:28px;font-weight:600;line-height:1;letter-spacing:-0.02em;}
.kpi-sub{font-size:11px;color:var(--text2);margin-top:5px;flex:1;}
.kpi-badge{margin-top:10px;min-height:20px;}
.up{color:var(--accent2);}
.dn{color:var(--red);}
.acc{color:var(--accent);}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem;}
@media(max-width:640px){.g2,.g31{grid-template-columns:1fr;}}

/* CARDS */
.card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem 1.375rem;transition:border-color .15s;}
.card-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:16px;font-family:"DM Mono",monospace;}
.chart-wrap{position:relative;}

/* INSIGHT BAR */
.insight{background:var(--surface);border:0.5px solid var(--border);border-left:2px solid var(--accent2);border-radius:var(--r);padding:.875rem 1.125rem;margin-bottom:1.25rem;font-size:13px;color:var(--text2);}
.insight strong{color:var(--text);font-weight:500;}

/* HOSPITAL CARDS */
.hcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);padding:1.25rem 1.375rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;flex:0 0 300px;scroll-snap-align:start;}
.hosp-scroll-wrap{position:relative;}
.hosp-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.hosp-scroll::-webkit-scrollbar{height:3px;}
.hosp-scroll::-webkit-scrollbar-track{background:transparent;}
.hosp-scroll::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:3px;}
.hosp-scroll-fade{position:absolute;right:0;top:0;bottom:10px;width:60px;background:linear-gradient(to right,transparent,var(--bg));pointer-events:none;}
.hcard::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));opacity:0;transition:opacity .18s;}
.hcard:hover{border-color:var(--border-md);transform:translateY(-1px);}
.hcard:hover::before{opacity:1;}
.hcard-name{font-size:17px;font-weight:600;letter-spacing:-0.01em;margin-bottom:2px;}
.hcard-sub{font-size:11px;color:var(--text3);margin-bottom:16px;}
.hcard-metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.hcard-metric-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:4px;font-family:"DM Mono",monospace;}
.hcard-metric-val{font-size:19px;font-weight:600;letter-spacing:-0.01em;}
.open-arrow{font-size:11px;color:var(--text3);position:absolute;top:1.25rem;right:1.375rem;transition:color .15s;}
.hcard:hover .open-arrow{color:var(--accent2);}

/* TABLE */
.tcard{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1rem;}
.tbar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:0.5px solid var(--border);}
.tbar-ttl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);font-family:"DM Mono",monospace;}
select{font-size:12px;padding:4px 8px;border-radius:var(--r-sm);border:0.5px solid var(--border-md);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{padding:8px 16px;font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);text-align:left;background:var(--surface2);border-bottom:0.5px solid var(--border);white-space:nowrap;font-family:"DM Mono",monospace;}
tbody td{padding:10px 16px;border-bottom:0.5px solid var(--border);color:var(--text);}
tbody tr:last-child td{border-bottom:none;}
tbody tr{transition:background .1s;}
tbody tr:hover td{background:var(--surface2);}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:"DM Mono",monospace;}

/* BAR */
.bar-bg{background:var(--surface3);border-radius:3px;height:4px;}
.bar-fill{height:4px;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}

/* RANK NUM */
.rank{font-size:10px;color:var(--text3);min-width:18px;font-family:"DM Mono",monospace;}

/* EMPTY */
.empty{padding:3rem;text-align:center;color:var(--text3);font-size:13px;}

/* FOOTER */
.footer{margin-top:3rem;padding-top:1rem;border-top:0.5px solid var(--border);font-size:11px;color:var(--text3);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;font-family:"DM Mono",monospace;}

/* TREND BADGE */
.trend{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;}
.trend-up{background:rgba(0,212,170,0.12);color:#00d4aa;}
.trend-dn{background:rgba(255,94,94,0.12);color:#ff5e5e;}
.trend-flat{background:rgba(138,136,153,0.12);color:#8a8899;}

/* MOMENTUM */
.mom-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;font-family:'DM Mono',monospace;white-space:nowrap;}
.mom-acc{background:rgba(0,212,170,0.12);color:#00d4aa;}
.mom-stable{background:rgba(138,136,153,0.1);color:#8a8899;}
.mom-dec{background:rgba(255,94,94,0.12);color:#ff5e5e;}
.mom-dead{background:rgba(255,94,94,0.2);color:#ff5e5e;}
.htab-row{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:1.25rem;}
.htab{font-size:13px;padding:7px 16px;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:color .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;white-space:nowrap;}
.htab:hover{color:var(--text);}
.htab.active{color:var(--text);font-weight:500;border-bottom-color:var(--accent);}
.sparkrow td{vertical-align:middle;}
.clinic-chart-row{display:none;}
.clinic-chart-row.open{display:table-row;}
.clinic-chart-cell{background:var(--surface2);padding:16px 20px !important;border-bottom:0.5px solid var(--border);}

/* AI CHAT */
.chat-btn{font-size:12px;background:linear-gradient(135deg,#7c5cfc,#5a3fd4);border:none;border-radius:var(--r-sm);padding:6px 12px;color:#fff;cursor:pointer;font-family:inherit;font-weight:500;transition:opacity .15s;}
.chat-btn:hover{opacity:.85;}
.chat-panel{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--surface);border-left:0.5px solid var(--border-md);display:flex;flex-direction:column;z-index:1000;transform:translateX(100%);transition:transform .25s ease;}
.chat-panel.open{transform:translateX(0);}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.chat-header-title{font-size:14px;font-weight:600;}
.chat-header-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.chat-close{background:none;border:none;color:var(--text2);cursor:pointer;font-size:18px;padding:2px 6px;font-family:inherit;}
.chat-close:hover{color:var(--text);}
.chat-messages{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:12px;}
.chat-msg{max-width:90%;font-size:13px;line-height:1.5;}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;padding:8px 12px;border-radius:12px 12px 3px 12px;}
.chat-msg.assistant{align-self:flex-start;background:var(--surface2);color:var(--text);padding:8px 12px;border-radius:12px 12px 12px 3px;}
.chat-msg.thinking{align-self:flex-start;color:var(--text3);font-size:12px;font-family:'DM Mono',monospace;padding:4px 0;}
.chat-input-area{padding:1rem;border-top:0.5px solid var(--border);flex-shrink:0;}
.chat-input-row{display:flex;gap:8px;}
.chat-input{flex:1;background:var(--surface2);border:0.5px solid var(--border-md);border-radius:var(--r-sm);padding:8px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:none;}
.chat-input:focus{border-color:var(--accent);}
.chat-send{background:var(--accent);border:none;border-radius:var(--r-sm);padding:8px 14px;color:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;flex-shrink:0;}
.chat-send:hover{opacity:.85;}
.chat-send:disabled{opacity:.4;cursor:default;}
.chat-api-setup{padding:1rem;background:var(--surface2);border-radius:var(--r-sm);margin-bottom:12px;font-size:12px;color:var(--text2);}
.chat-api-input{width:100%;background:var(--surface);border:0.5px solid var(--border-md);border-radius:var(--r-sm);padding:7px 10px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;outline:none;margin-top:6px;}
.chat-api-input:focus{border-color:var(--accent);}
.chat-api-save{margin-top:8px;width:100%;background:var(--accent);border:none;border-radius:var(--r-sm);padding:7px;color:#fff;font-size:12px;cursor:pointer;font-family:inherit;}
.chat-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.chat-suggestion{font-size:11px;padding:4px 10px;border:0.5px solid var(--border-md);border-radius:20px;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s;}
.chat-suggestion:hover{border-color:var(--accent);color:var(--text);}

/* MOBILE */
@media(max-width:600px){
  .shell{padding:1rem 1rem 3rem;}
  .ctrl-bar{gap:6px;padding:8px 10px;}
  .ctrl-label{display:none;}
  .pp-row{margin-left:0;}
  .hcard-metrics{grid-template-columns:1fr 1fr;}
  .kpis{grid-template-columns:1fr 1fr;}
  .topbar{gap:8px;}
  .upload-btn{font-size:11px;padding:5px 8px;}
  table{font-size:12px;}
  thead th,tbody td{padding:7px 10px;}
}
@media(max-width:400px){
  .kpis{grid-template-columns:1fr 1fr;}
  .hcard-metrics{grid-template-columns:1fr 1fr;}
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:fadeUp .25s ease both;}
</style>
</head>

  <div class="footer">
    <span>Arqena · Internal Operations</span>
    <span id="footerDate"></span>
    <span id="lastUpdated"></span>

</div>

const EVENTS=RAW.map(r=>({date:new Date(r[0]),ds:r[0],clinic:r[1],hospital:r[2],region:r[3],lost:r[4],days:r[5],post:r[6]||null,caseId:r[7]}));
const HOSPS=[...new Set(EVENTS.map(e=>e.hospital))].sort();
const MAX_D=new Date(Math.max(...EVENTS.map(e=>e.date)));
const HOSP_HEX={'Vetsia':'#f0a429','Rijswijk':'#4da6ff','Albano':'#7c5cfc','Bagarmossen':'#00d4aa'};
const HOSP_REGION={'Vetsia':'Spain','Rijswijk':'Netherlands','Albano':'Sweden','Bagarmossen':'Sweden'};
const REGION_CODE={'Spain':'ES','Netherlands':'NL','Sweden':'SE','Denmark':'DK','United Kingdom':'UK'};
const COMING_SOON=[
  {name:'Albano',region:'Sweden'},
  {name:'Bagarmossen',region:'Sweden'},
  {name:"Mima'ns",region:'Spain'},
  {name:'Arvivet',region:'Spain'},
  {name:'SDU',region:'Netherlands'},
  {name:'MCD',region:'Netherlands'},
];

function getRegion(h){
  const e=EVENTS.find(ev=>ev.hospital===h);
  return e?e.region:(HOSP_REGION[h]||'');
}
function getCountries(){
  const from_data=[...new Set(EVENTS.map(e=>e.region))].filter(Boolean);
  const from_coming=COMING_SOON.map(c=>c.region).filter(r=>!from_data.includes(r));
  return[...new Set([...from_data,...from_coming])].sort();
}
function getHospsByCountry(country){
  return HOSPS.filter(h=>getRegion(h)===country);
}

let selH='all', selCountry='all', selP=0, cmp=false, C={};

window.addEventListener('DOMContentLoaded',()=>{
  // Try to restore uploaded CSV from localStorage
  try{
    const saved=localStorage.getItem('arqena_csv');
    const savedDate=localStorage.getItem('arqena_csv_date');
    if(saved){
      const events=parseCSVText(saved);
      if(events&&events.length>0){
        EVENTS.length=0;
        events.forEach(e=>EVENTS.push({...e,date:new Date(e.ds)}));
        HOSPS.length=0;
        [...new Set(EVENTS.map(e=>e.hospital))].sort().forEach(h=>HOSPS.push(h));
        // Show when CSV was uploaded
        const uploadedEl=document.getElementById('lastUpdated');
        if(uploadedEl&&savedDate){
          const d=new Date(savedDate);
          uploadedEl.textContent='Data uploaded: '+d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        }
      }
    }
  }catch(err){console.warn('localStorage unavailable');}

  buildPills();
  render();

  const maxD=new Date(Math.max(...EVENTS.map(e=>e.date)));
  document.getElementById('footerDate').textContent=
    new Date(Math.min(...EVENTS.map(e=>e.date))).toLocaleDateString('en-GB',{month:'short',year:'numeric'})+
    ' – '+maxD.toLocaleDateString('en-GB',{month:'short',year:'numeric'});
  updateLastUpdated();
});

function buildPills(){
  const el=document.getElementById('hospPills');
  el.innerHTML='';

  // Level 1: All
  el.appendChild(navPill('All hospitals','all-pill hp all'+(selH==='all'&&selCountry==='all'?' active':''),()=>{
    selH='all';selCountry='all';buildPills();render();
  }));

  // Level 2: Countries
  getCountries().forEach(country=>{
    const code=REGION_CODE[country]||country.slice(0,2).toUpperCase();
    const isSelCountry=selCountry===country;
    const p=navPill(code,'hp country'+(isSelCountry?' active':''),()=>{
      selCountry=isSelCountry?'all':country;
      selH='all';
      buildPills();render();
    });
    el.appendChild(p);

    // Level 3: Hospitals in this country (only show if country selected)
    if(isSelCountry){
      const hospsInCountry=getHospsByCountry(country);
      // Separator
      const sep=document.createElement('span');
      sep.style.cssText='color:var(--text3);font-size:12px;margin:0 2px;align-self:center';
      sep.textContent='›';
      el.appendChild(sep);

      hospsInCountry.forEach(h=>{
        const hpill=navPill(h,'hp hosp'+(selH===h?' active':''),()=>{
          selH=selH===h?'all':h;buildPills();render();
        });
        el.appendChild(hpill);
      });

      // Coming soon in this country
      COMING_SOON.filter(c=>c.region===country).forEach(c=>{
        const cp=navPill(c.name+' ·soon','hp hosp coming',null);
        el.appendChild(cp);
      });
    }
  });
}

function navPill(label,cls,onclick){
  const b=document.createElement('button');
  b.className=cls;b.textContent=label;
  if(onclick)b.onclick=onclick;
  else{b.disabled=true;b.style.opacity='0.35';b.style.cursor='default';}
  return b;
}

function selHosp(h){
  selH=h;buildPills();render();
}
function toggleCompare(){cmp=!cmp;document.getElementById('cmpBtn').classList.toggle('on',cmp);render();}
function setPeriod(d,el){selP=d;document.querySelectorAll('.pp').forEach(b=>b.classList.remove('active'));el.classList.add('active');render();}
function byPeriod(ev){if(!selP)return ev;const c=new Date(MAX_D);c.setDate(c.getDate()-selP);return ev.filter(e=>e.date>=c);}
function byPrevPeriod(ev){
  if(!selP)return[];
  const end=new Date(MAX_D);end.setDate(end.getDate()-selP);
  const start=new Date(end);start.setDate(start.getDate()-selP);
  return ev.filter(e=>e.date>=start&&e.date<end);
}
function trendBadge(curr,prev){
  if(!prev||prev===0)return'';
  const pct=Math.round((curr-prev)/prev*100);
  if(pct>0)return`<span class="trend trend-up">↑ ${pct}% vs prior</span>`;
  if(pct<0)return`<span class="trend trend-dn">↓ ${Math.abs(pct)}% vs prior</span>`;
  return`<span class="trend trend-flat">→ flat vs prior</span>`;
}
function byHosp(ev,h){return h==='all'?ev:ev.filter(e=>e.hospital===h);}
function periodStr(ev){
  if(!ev.length)return'';
  const ds=ev.map(e=>e.date),f=d=>d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  return f(new Date(Math.min(...ds)))+' – '+f(new Date(Math.max(...ds)));
}

function agg(ev){
  const cases={},mo={},pl=[];
  ev.forEach(e=>{
    const k=e.caseId;
    if(!cases[k])cases[k]={caseId:k,clinic:e.clinic,hospital:e.hospital,ds:e.ds,maxPost:0};
    if((e.post||0)>cases[k].maxPost)cases[k].maxPost=e.post||0;
    if(e.post!==null)pl.push(e.post);
    const m=e.ds.slice(0,7);mo[m]=(mo[m]||0)+1;
  });
  const cArr=Object.values(cases);
  const uniqueTotal=cArr.length;
  const replied=cArr.filter(c=>c.maxPost>1).length;
  const responseRate=uniqueTotal>0?Math.round(replied/uniqueTotal*100):0;
  const cm={};
  cArr.forEach(c=>{
    if(!cm[c.clinic])cm[c.clinic]={name:c.clinic,n:0,replied:0};
    cm[c.clinic].n++;
    if(c.maxPost>1)cm[c.clinic].replied++;
  });
  const avgPost=pl.length?(pl.reduce((a,b)=>a+b,0)/pl.length).toFixed(1):'–';
  const dl=ev.filter(e=>e.days!==null).map(e=>typeof e.days==='string'?parseFloat(e.days.replace(',','.')):e.days).filter(v=>!isNaN(v));
  const avgDays=dl.length?(dl.reduce((a,b)=>a+b,0)/dl.length).toFixed(1):'–';
  const daysN=dl.length;
  return{clinics:Object.values(cm).sort((a,b2)=>b2.n-a.n),monthly:mo,total:uniqueTotal,replied,responseRate,avgDays,daysN,avgPost};
}

function calcGrowthPulse(pev){
  // Weekly case counts for last 8 weeks
  const seen={},wMap={};
  EVENTS.forEach(e=>{
    if(seen[e.caseId])return;
    seen[e.caseId]=1;
    const w=isoWeekKey(e.ds);
    wMap[w]=(wMap[w]||0)+1;
  });
  const weeks=Object.keys(wMap).sort();
  const last8=weeks.slice(-8).map(w=>wMap[w]||0);
  const avg4=last8.slice(-4).reduce((a,b)=>a+b,0)/4;
  const prev4=last8.slice(0,4).reduce((a,b)=>a+b,0)/4;
  const pct=prev4>0?Math.round((avg4-prev4)/prev4*100):null;
  const weeklyAvg=last8.length?+(last8.reduce((a,b)=>a+b,0)/last8.length).toFixed(1):0;
  return{last8,weeks:weeks.slice(-8),avg4:+avg4.toFixed(1),pct,weeklyAvg,state:pct===null?'stable':pct>=15?'accelerating':pct<=-15?'declining':'stable'};
}

function calcHospLast8(h){
  const seen={},wMap={};
  EVENTS.filter(e=>e.hospital===h).forEach(e=>{
    if(seen[e.caseId])return;seen[e.caseId]=1;
    const w=isoWeekKey(e.ds);wMap[w]=(wMap[w]||0)+1;
  });
  const weeks=Object.keys(wMap).sort().slice(-8);
  return weeks.map(w=>wMap[w]||0);
}

function calcHospWeeklyAvg(h){
  const vals=calcHospLast8(h);
  if(!vals.length)return'–';
  return(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1);
}

function calcHospPulse(h){
  const vals=calcHospLast8(h);
  if(vals.length<4)return{state:'stable'};
  const recent=(vals[vals.length-1]+(vals[vals.length-2]||0))/2;
  const prior=((vals[vals.length-3]||0)+(vals[vals.length-4]||0))/2;
  if(prior===0)return{state:recent>0?'accelerating':'stable'};
  const pct=Math.round((recent-prior)/prior*100);
  return{state:pct>=20?'accelerating':pct<=-20?'declining':'stable',pct};
}

// ── MOMENTUM ENGINE ───────────────────────────────────────────────────────────
function isoWeekKey(ds){
  const d=new Date(ds);d.setHours(0,0,0,0);
  d.setDate(d.getDate()+4-(d.getDay()||7));
  const y=new Date(d.getFullYear(),0,1);
  const w=Math.ceil(((d-y)/86400000+1)/7);
  return d.getFullYear()+'-W'+String(w).padStart(2,'0');
}

function clinicWeeklyVolume(h){
  // Returns {clinicName: {yw: count}} for unique cases
  const hospEv=EVENTS.filter(e=>e.hospital===h);
  const seenCases={};
  const result={};
  hospEv.forEach(e=>{
    if(seenCases[e.caseId])return;
    seenCases[e.caseId]=1;
    const w=isoWeekKey(e.ds);
    if(!result[e.clinic])result[e.clinic]={};
    result[e.clinic][w]=(result[e.clinic][w]||0)+1;
  });
  return result;
}

function calcMomentum(weekMap){
  // Get sorted weeks
  const allWeeks=Object.keys(weekMap).sort();
  if(allWeeks.length<4)return{state:'stable',streak:0,pct:0,weeks:allWeeks,vals:allWeeks.map(w=>weekMap[w]||0)};

  const vals=allWeeks.map(w=>weekMap[w]||0);

  // Rolling 2-week averages: recent vs prior
  const n=vals.length;
  const recent=(vals[n-1]+vals[n-2])/2;
  const prior=(vals[n-3]+vals[n-4])/2;

  // Decline streak: count consecutive weeks at end with value < their 4w avg before
  let streak=0;
  for(let i=vals.length-1;i>=2;i--){
    const avg4=(vals[i-1]+vals[i-2]+(vals[i-3]||0)+(vals[i-4]||0))/4;
    if(vals[i]<avg4*0.7) streak++;
    else break;
  }

  // Last 2 weeks zero = inactive
  const recentZero=vals[n-1]===0&&vals[n-2]===0;

  let state,pct=0;
  if(recentZero&&n>4){state='inactive';}
  else if(prior===0&&recent>0){state='accelerating';pct=100;}
  else if(prior===0){state='stable';}
  else{
    pct=Math.round((recent-prior)/prior*100);
    if(pct>=20)state='accelerating';
    else if(pct<=-20)state='declining';
    else state='stable';
  }

  return{state,streak,pct,weeks:allWeeks,vals};
}

function momPill(m){
  if(m.state==='accelerating') return`<span class="mom-pill mom-acc">↑ Accelerating${m.pct?` +${m.pct}%`:''}</span>`;
  if(m.state==='declining')    return`<span class="mom-pill mom-dec">↓ Declining${m.streak>1?` · ${m.streak}w streak`:''}</span>`;
  if(m.state==='inactive')     return`<span class="mom-pill mom-dead">● Inactive</span>`;
  return`<span class="mom-pill mom-stable">→ Stable</span>`;
}

function momentumView(h){
  const volMap=clinicWeeklyVolume(h);
  const clinics=Object.entries(volMap).map(([name,wm])=>({name,wm,mom:calcMomentum(wm)}));

  // Sort: inactive first, then declining by streak, then stable, then accelerating
  const order={inactive:0,declining:1,stable:2,accelerating:3};
  clinics.sort((a,b)=>{
    if(order[a.mom.state]!==order[b.mom.state])return order[a.mom.state]-order[b.mom.state];
    return b.mom.streak-a.mom.streak;
  });

  const allWeeks=[...new Set(clinics.flatMap(c=>c.mom.weeks))].sort();
  const last8=allWeeks.slice(-8);

  return`<div class="tcard">

      </tr></thead>

        return`<tr class="sparkrow" onclick="toggleClinicChart('cc${i}','${c.name.replace(/'/g,"\\'")}','${h}')">
          <td style="font-weight:500;font-size:13px">${c.name}</td>

          <td>

                const wLabel=last8[wi]?fmtKey(last8[wi],'week'):'';

              }).join('')}

          </td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
  </div>`;
}

    <th class="num" style="width:11%">Cases</th>

  ${clinics.map((c,i)=>{

/* CHART HELPERS */
function dc(){return{tc:'#4a4a5a',gc:'rgba(255,255,255,0.04)'};}
function dest(id){if(C[id]){C[id].destroy();delete C[id];}}
function fmtMonth(m){const[y,mo]=m.split('-');return['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+mo]+' \''+y.slice(2);}

function granularity(){
  if(selP===7||selP===30)return'day';
  if(selP===90)return'week';
  return'month';
}

function bucketKey(ds,gran){
  if(gran==='day')return ds;
  if(gran==='week'){
    const d=new Date(ds);d.setHours(0,0,0,0);
    d.setDate(d.getDate()+4-(d.getDay()||7));
    const y=new Date(d.getFullYear(),0,1);
    const w=Math.ceil(((d-y)/86400000+1)/7);
    return d.getFullYear()+'-W'+String(w).padStart(2,'0');
  }
  return ds.slice(0,7);
}

function fmtKey(k,gran){
  if(gran==='day'){const d=new Date(k);return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});}
  if(gran==='week'){
    const[y,w]=k.split('-W');
    const jan4=new Date(+y,0,4);
    const start=new Date(jan4);
    start.setDate(jan4.getDate()-(jan4.getDay()||7)+1+(+w-1)*7);
    return start.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }
  return fmtMonth(k);
}

function eventBuckets(ev){
  const gran=granularity(),m={},seen={};
  ev.forEach(e=>{if(!seen[e.caseId]){seen[e.caseId]=1;const k=bucketKey(e.ds,gran);m[k]=(m[k]||0)+1;}});
  return{entries:Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])),gran};
}

function chartType(){return'line';}

  const totals=allK.map((_,i)=>HOSPS.reduce((s,h)=>s+hospCounts[h][i],0));
  const isLine=chartType()==='line';
  C[id]=new Chart(el,{type:isLine?'line':'bar',
    data:{labels:allK.map(k=>fmtKey(k,gran)),datasets:[{
      label:'Total',data:totals,
      backgroundColor:isLine?'rgba(124,92,252,0.12)':'rgba(124,92,252,0.25)',
      borderColor:'#7c5cfc',borderWidth:1.5,borderRadius:isLine?0:4,
      fill:isLine,tension:0.35,pointRadius:isLine?3:0,pointBackgroundColor:'#7c5cfc'
    }]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{

        label:()=>null,
        afterBody:items=>{const i=items[0].dataIndex;return HOSPS.filter(h=>hospCounts[h][i]>0).map(h=>`  ${h}: ${hospCounts[h][i]}`);}
      },displayColors:false}},
      scales:{x:{ticks:{color:tc,font:{size:10},maxRotation:30},grid:{display:false}},
              y:{ticks:{color:tc,font:{size:11}},grid:{color:gc},beginAtZero:true}}}});
}

function exportCSV(){
  const pev=byPeriod(EVENTS);
  const ev=selH==='all'?pev:byHosp(pev,selH);
  const seen={};const rows=[['Case ID','Clinic','Hospital','Region','Date','Messages','Days to appt']];
  ev.forEach(e=>{
    if(!seen[e.caseId]){
      seen[e.caseId]=1;
      rows.push([e.caseId,e.clinic,e.hospital,e.region,e.ds,e.post??'',e.days??'']);
    }
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download=`arqena-export-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function parseCSVText(text){
  const lines=text.trim().split('\n');
  const hdr=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
  const ci=hdr.indexOf('case_organization_name'),hi=hdr.indexOf('contributor_organization_name');
  const ri=hdr.indexOf('Region'),li=hdr.indexOf('is_lost'),di=hdr.indexOf('days_to_appt'),ti=hdr.indexOf('referral_sent_at_utc'),pi=hdr.indexOf('post_count'),ki=hdr.indexOf('case_id');
  if(ci<0||hi<0)return null;
  const events=[];
  lines.slice(1).forEach(l=>{
    const v=l.split(',').map(x=>x.trim().replace(/"/g,''));
    const ds=(v[ti]||'').slice(0,10);
    if(ds&&v[ci]&&v[hi])events.push({
      date:new Date(ds),ds,clinic:v[ci],hospital:v[hi],region:v[ri]||'',
      lost:v[li]==='0'?0:1,
      days:parseFloat((v[di]||'').replace(',','.'))||null,
      post:parseInt(v[pi])||null,
      caseId:parseInt(v[ki])||null
    });
  });
  return events;
}

function applyEvents(events){
  EVENTS.length=0;
  events.forEach(e=>EVENTS.push({...e,date:new Date(e.ds)}));
  HOSPS.length=0;
  [...new Set(EVENTS.map(e=>e.hospital))].sort().forEach(h=>HOSPS.push(h));
  selH='all';selCountry='all';buildPills();render();
  updateLastUpdated();
}

function updateLastUpdated(){
  const maxD=new Date(Math.max(...EVENTS.map(e=>e.date)));
  const el=document.getElementById('lastUpdated');
  if(el)el.textContent='Last updated: '+maxD.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}

function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    const events=parseCSVText(ev.target.result);
    if(!events){alert('Required columns not found.');return;}
    try{localStorage.setItem('arqena_csv',ev.target.result);
        localStorage.setItem('arqena_csv_date',new Date().toISOString());}
    catch(err){console.warn('localStorage unavailable');}
    applyEvents(events);
  };
  r.readAsText(file);
}

function buildDataContext(){
  const pev=byPeriod(EVENTS);
  const td=agg(pev);
  const hospData=HOSPS.map(h=>{
    const d=agg(byHosp(pev,h));
    const wm=clinicWeeklyVolume(h);
    const clinicMom=Object.entries(wm).map(([name,wkmap])=>{
      const m=calcMomentum(wkmap);
      return{name,total:Object.values(wkmap).reduce((a,b)=>a+b,0),momentum:m.state,streak:m.streak};
    }).sort((a,b)=>b.total-a.total);
    return{hospital:h,region:getRegion(h),cases:d.total,responseRate:d.responseRate+'%',avgMessages:d.avgPost,avgDaysToAppt:d.avgDays,clinics:d.clinics.length,clinicDetail:clinicMom};
  });
  const seen={},wMap={};
  EVENTS.forEach(e=>{if(!seen[e.caseId]){seen[e.caseId]=1;const w=isoWeekKey(e.ds);wMap[w]=(wMap[w]||0)+1;}});
  const weeklyTotals=Object.entries(wMap).sort((a,b)=>a[0].localeCompare(b[0])).slice(-12).map(([w,v])=>({week:w,cases:v}));
  return{period:document.getElementById('periodLbl').textContent||'All time',selectedHospital:selH==='all'?'All hospitals':selH,totalUniqueCases:td.total,totalResponseRate:td.responseRate+'%',hospitals:hospData,weeklyVolume:weeklyTotals,dataRange:document.getElementById('footerDate').textContent};
}

function addChatMsg(role,text){
  const msgs=document.getElementById('chatMessages');
  const div=document.createElement('div');
  div.className='chat-msg '+role;
  div.textContent=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
  return div;
}

function onChatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat();}}
function askSuggestion(el){
  document.getElementById('chatInput').value=el.textContent;
  document.getElementById('chatSuggestions').style.display='none';
  sendChat();
}

async function sendChat(){
  const input=document.getElementById('chatInput');
  const question=input.value.trim();
  if(!question)return;
  input.value='';
  document.getElementById('chatSend').disabled=true;
  document.getElementById('chatSuggestions').style.display='none';
  addChatMsg('user',question);
  const thinking=addChatMsg('thinking','Thinking...');
  chatHistory.push({role:'user',content:question});

  const sys=`You are an AI assistant in Arqena's internal veterinary referral dashboard. Answer questions based on this live data:\n\n${JSON.stringify(buildDataContext(),null,2)}\n\nBe concise — 2-4 sentences max unless detail is requested. Use specific numbers. Respond in the same language the user writes in.`;

  try{
    const res=await fetch('/.netlify/functions/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:sys,messages:chatHistory})
    });
    const data=await res.json();
    thinking.remove();
    if(data.error){addChatMsg('assistant','Error: '+data.error.message);chatHistory.pop();}
    else{
      const reply=data.content[0].text;
      addChatMsg('assistant',reply);
      chatHistory.push({role:'assistant',content:reply});
      if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);
    }
  }catch(err){
    thinking.remove();
    addChatMsg('assistant','Something went wrong. Try again.');
    chatHistory.pop();
  }
  document.getElementById('chatSend').disabled=false;
  document.getElementById('chatInput').focus();
}
